<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cây Kèn Hồng 3D</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden;
      background: linear-gradient(to bottom, #6ab4f5 0%, #c8e8ff 55%, #d4efc0 100%); }
    canvas { display:block; position:absolute; inset:0; }

    /* ── Header bar ── */
    #topbar {
      position:absolute; top:0; left:0; right:0; z-index:10;
      padding:12px 20px;
      display:flex; align-items:center; gap:14px;
      background:linear-gradient(to bottom, rgba(0,0,0,.45) 0%, transparent 100%);
    }
    #back {
      background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3);
      color:#fff; font-size:13px; padding:6px 14px; border-radius:8px;
      cursor:pointer; transition:background .15s; font-family:system-ui;
    }
    #back:hover { background:rgba(255,255,255,.3); }
    #hdtitle { color:#fff; font-family:system-ui; }
    #hdtitle h1 { font-size:17px; font-weight:700; }
    #hdtitle p  { font-size:11px; color:rgba(255,255,255,.6); margin-top:2px; }

    /* ── Species card (bottom-right) ── */
    #card {
      position:absolute; bottom:56px; right:20px; z-index:10;
      background:rgba(10,18,40,.82); backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.1); border-radius:13px;
      padding:14px 18px; color:#ddd; font-family:system-ui; font-size:12px;
      min-width:165px; box-shadow:0 6px 30px rgba(0,0,0,.45);
    }
    #card .ctitle { color:#E8709E; font-weight:700; font-size:13px;
      margin-bottom:10px; display:block; }
    #card table { border-collapse:collapse; width:100%; }
    #card td { padding:3px 0; }
    #card td:first-child { color:#888; padding-right:12px; white-space:nowrap; }

    /* ── Bottom hint ── */
    #hint {
      position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
      z-index:10;
      background:rgba(0,0,0,.5); backdrop-filter:blur(10px);
      color:#ccc; font-size:12px; font-family:system-ui;
      padding:7px 20px; border-radius:20px;
      border:1px solid rgba(255,255,255,.08); white-space:nowrap;
    }

    /* ── Toggle auto-rotate ── */
    #rotatebtn {
      position:absolute; top:14px; right:20px; z-index:10;
      background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.25);
      color:#fff; font-size:12px; padding:6px 13px; border-radius:8px;
      cursor:pointer; font-family:system-ui; transition:background .15s;
    }
    #rotatebtn:hover { background:rgba(255,255,255,.25); }
    #rotatebtn.on { background:rgba(232,112,158,.35); border-color:rgba(232,112,158,.5); }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<div id="topbar">
  <button id="back" onclick="history.length>1 ? history.back() : window.close()">← Quay lại</button>
  <div id="hdtitle">
    <h1>🌸 Cây Kèn Hồng</h1>
    <p>Tabebuia rosea — Mô hình 3D tương tác</p>
  </div>
</div>

<button id="rotatebtn" class="on">⟳ Tự xoay</button>

<div id="card">
  <span class="ctitle">Thông tin mẫu</span>
  <table>
    <tr><td>Số hiệu</td>  <td><b>KH-001</b></td></tr>
    <tr><td>Chiều cao</td><td>10 m</td></tr>
    <tr><td>Đường kính</td><td>25 cm</td></tr>
    <tr><td>Năm trồng</td><td>2020</td></tr>
    <tr><td>Trạng thái</td><td style="color:#4caf50;font-weight:700">Tốt</td></tr>
  </table>
</div>

<div id="hint">🖱 Kéo để xoay &nbsp;·&nbsp; Scroll để zoom</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ── Seeded deterministic random ─────────────────────── */
const rng = n => { const x = Math.sin(n * 127.1 + 311.7) * 43758.5453; return x - Math.floor(x); };

/* ── Renderer ────────────────────────────────────────── */
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

/* ── Scene ───────────────────────────────────────────── */
const scene  = new THREE.Scene();
scene.fog    = new THREE.FogExp2(0xc8e8ff, 0.028);

const camera = new THREE.PerspectiveCamera(48, innerWidth/innerHeight, 0.1, 100);
camera.position.set(8, 4.5, 8);

/* ── Controls ────────────────────────────────────────── */
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3.5, 0);
controls.enableDamping   = true;
controls.dampingFactor   = 0.06;
controls.autoRotate      = true;
controls.autoRotateSpeed = 0.45;
controls.minDistance     = 2.5;
controls.maxDistance     = 22;
controls.maxPolarAngle   = Math.PI / 2 - 0.04;
controls.update();

document.getElementById('rotatebtn').addEventListener('click', function() {
  controls.autoRotate = !controls.autoRotate;
  this.classList.toggle('on', controls.autoRotate);
  this.textContent = controls.autoRotate ? '⟳ Tự xoay' : '⏸ Dừng';
});

/* ── Lighting ────────────────────────────────────────── */
scene.add(new THREE.HemisphereLight(0xadd8f7, 0x5a8a30, 0.6));

const sun = new THREE.DirectionalLight(0xFFF3DC, 1.8);
sun.position.set(6, 12, 5);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far  = 30;
[-9, 9].forEach(v => {
  sun.shadow.camera.left = sun.shadow.camera.bottom = v < 0 ? v : -v;
  sun.shadow.camera.right = sun.shadow.camera.top   = v > 0 ?  v : -v;
});
sun.shadow.camera.left = sun.shadow.camera.bottom = -9;
sun.shadow.camera.right = sun.shadow.camera.top   =  9;
sun.shadow.bias = -0.0006;
scene.add(sun);

// Soft fill
const fill = new THREE.DirectionalLight(0xd0e8ff, 0.4);
fill.position.set(-5, 5, -4);
scene.add(fill);

/* ── Ground ──────────────────────────────────────────── */
const groundMat = new THREE.MeshStandardMaterial({ color:0x4a7a30, roughness:0.95 });
const ground = new THREE.Mesh(new THREE.CircleGeometry(14, 72), groundMat);
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

// Paved ring around trunk
const paved = new THREE.Mesh(
  new THREE.RingGeometry(0.48, 1.3, 40),
  new THREE.MeshStandardMaterial({ color:0xa09080, roughness:0.9 })
);
paved.rotation.x = -Math.PI/2; paved.position.y = 0.006;
scene.add(paved);

/* ── Materials ───────────────────────────────────────── */
const mBark = new THREE.MeshStandardMaterial({
  color: 0x3A2018, roughness:0.96, metalness:0
});
const mFlower = new THREE.MeshStandardMaterial({
  color: 0xD4609E, roughness:0.70, metalness:0,
  emissive: new THREE.Color(0.18, 0.04, 0.13),
  emissiveIntensity: 0.22,
});

/* ── Tree building helpers ───────────────────────────── */
function mkCyl(rTop, rBot, h, mat, seg=8) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rTop, rBot, h, seg, 2), mat);
  m.castShadow = true; return m;
}
function mkSphere(r, mat) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), mat);
  m.castShadow = true; return m;
}

function flowerCluster(seed, spread=0.30) {
  const g = new THREE.Group();
  const n = 5 + Math.round(rng(seed) * 4);       // 5–9 blobs per cluster
  for (let k=0; k<n; k++) {
    const r  = 0.12 + rng(seed+k*3)   * 0.15;
    const ox = (rng(seed+k*3+1) - 0.5) * spread * 2.2;
    const oy = (rng(seed+k*3+2) - 0.5) * spread * 0.9;
    const oz = (rng(seed+k*3+3) - 0.5) * spread * 2.2;
    const s  = mkSphere(r, mFlower);
    s.position.set(ox, oy, oz);
    g.add(s);
  }
  return g;
}

// Recursive sub-branch (depth 0 = leaf-branch, depth 1 = secondary)
function subBranch(parentLen, seed, depth) {
  const g    = new THREE.Group();
  const len  = parentLen * (0.45 + rng(seed)    * 0.28);
  const tilt = Math.PI  * (0.22 + rng(seed+1)   * 0.30);
  g.rotation.y = rng(seed+2) * Math.PI * 2;
  g.rotation.z = tilt;

  const bc = mkCyl(0.018, 0.038, len, mBark, 6);
  bc.position.y = len/2; g.add(bc);

  if (depth > 0) {
    const ns = 2 + Math.round(rng(seed+3));
    for (let i=0; i<ns; i++) {
      const sg = subBranch(len, seed*7+i*31, depth-1);
      sg.position.y = len * (0.5 + rng(seed+4+i) * 0.45);
      g.add(sg);
    }
  }
  // Flower at tip
  const fc = flowerCluster(seed * 13);
  fc.position.y = len; g.add(fc);
  // Extra cluster mid-branch
  if (rng(seed+99) > 0.4) {
    const fc2 = flowerCluster(seed * 17 + 3);
    fc2.position.y = len * 0.55; g.add(fc2);
  }
  return g;
}

/* ── Build Cây Kèn Hồng ─────────────────────────────── */
function buildTree() {
  const tree = new THREE.Group();

  // Trunk — slightly curved via scale trick
  const TH = 4.0;
  const trunk = mkCyl(0.13, 0.30, TH, mBark, 11);
  trunk.position.y = TH/2;
  tree.add(trunk);

  // Buttress roots (3 small wedges at base)
  for (let i=0; i<3; i++) {
    const root = mkCyl(0.06, 0.14, 0.5, mBark, 5);
    root.rotation.z = Math.PI*0.28;
    root.rotation.y = (i/3)*Math.PI*2;
    root.position.set(
      Math.cos((i/3)*Math.PI*2)*0.22, 0.22,
      Math.sin((i/3)*Math.PI*2)*0.22
    );
    tree.add(root);
  }

  // 7 main branches from crown
  const NB = 7;
  for (let i=0; i<NB; i++) {
    const phi    = (i/NB)*Math.PI*2 + rng(i)*0.55;
    const tilt   = Math.PI*(0.26 + rng(i+10)*0.24);   // 47–90° from up
    const len    = 1.9 + rng(i+20)*0.9;
    const startY = TH - 0.5 + rng(i+30)*0.55;

    const bg = new THREE.Group();
    bg.position.y = startY;
    bg.rotation.y = phi;
    bg.rotation.z = tilt;

    const bc = mkCyl(0.050, 0.088, len, mBark, 7);
    bc.position.y = len/2; bg.add(bc);

    // Clusters along main branch
    [0.5, 0.75, 1.0].forEach((frac, fi) => {
      const fc = flowerCluster(i*100 + fi);
      fc.position.y = len * frac; bg.add(fc);
    });

    // 2–3 sub-branches
    const ns = 2 + Math.round(rng(i+40));
    for (let j=0; j<ns; j++) {
      const sg = subBranch(len, i*200+j*37, 1);
      sg.position.y = len*(0.45 + rng(i+50+j)*0.5);
      bg.add(sg);
    }

    tree.add(bg);
  }

  return tree;
}

const tree = buildTree();
scene.add(tree);

/* ── Resize ──────────────────────────────────────────── */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ── Animate ─────────────────────────────────────────── */
const clock = new THREE.Clock();
(function loop() {
  requestAnimationFrame(loop);
  const t = clock.getElapsedTime();
  // Gentle wind sway
  tree.rotation.z = Math.sin(t * 0.45) * 0.013;
  tree.rotation.x = Math.cos(t * 0.33) * 0.009;
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
